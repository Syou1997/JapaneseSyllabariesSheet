<!DOCTYPE html>
<html lang="ja">

    <title>Syou的50音表</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

    <div class="sakura-bg"></div>

    <main class="game-wrapper">
        <header class="main-header">

                <button class="kana-card seion-card dan-e"><div class="kana-main"><span class="hira">へ</span><span class="kata">ヘ</span></div><span class="romaji">he</span><div class="shine"></div></button>

        <section class="chart-section bion-section">
            <div class="section-header">
                <span class="icon">🌸</span>
                <h2>2. 鼻音 / BION</h2>
            </div>
            <div class="kana-grid seion-grid bion-grid">
                <div class="gyo-label bion-label">鼻音行</div>
                <button class="kana-card bion-card">
                    <div class="kana-main"><span class="hira">ん</span><span class="kata">ン</span></div>
                    <span class="romaji">n</span>
                    <div class="shine"></div>
                </button>
                <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
            </div>
        </section>

        <section class="chart-section dakuon-section">
            <div class="section-header">
                <span class="icon">🌸</span>
                <h2>3. 濁音 / DAKUON</h2>
            </div>
            <div class="kana-grid seion-grid dakuon-grid-flow">

                <button class="kana-card dakuon-card dan-i"><div class="kana-main"><span class="hira">ぢ</span><span class="kata">ヂ</span></div><span class="romaji">ji</span><div class="shine"></div></button>
